<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Page Not Found — Angel Gadon</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="angel.css">
  <style>
    .error-wrap{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;}
    .error-code{font-family:'Cormorant Garamond',serif;font-size:120px;font-weight:300;line-height:1;color:var(--teal);margin-bottom:8px;}
    .error-msg{font-size:20px;font-weight:300;color:var(--ink);margin-bottom:8px;}
    .error-sub{font-size:14px;color:var(--text-secondary);margin-bottom:32px;}
  </style>
</head>
<body>
  <div class="error-wrap">
    <div class="error-code">404</div>
    <p class="error-msg">This page doesn't exist.</p>
    <p class="error-sub">It may have been moved or the URL is incorrect.</p>
    <a href="/" class="btn-teal">Back to Home</a>
  </div>
</body>
</html>
